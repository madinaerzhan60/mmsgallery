<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MMS Gallery - Hire</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
.page-shell { padding: 120px 48px 72px; }
.hire-layout { display: grid; grid-template-columns: 280px 1fr; gap: 22px; max-width: 1400px; margin: 0 auto; }
.filter-panel, .result-panel {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
}
.filter-panel { padding: 22px; position: sticky; top: 112px; height: fit-content; }
.result-panel { padding: 22px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
.hire-card { background: linear-gradient(180deg, var(--card-bg), var(--bg-secondary)); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: all 0.3s ease; }
.hire-card:hover { transform: translateY(-4px); border-color: var(--accent-primary); box-shadow: var(--card-shadow-hover); }
.hire-avatar { width: 66px; height: 66px; border-radius: 50%; object-fit: cover; border: 2px solid var(--success); background: var(--bg-tertiary); }
.hire-header { display:flex; align-items:center; gap:14px; margin-bottom: 12px; }
.hire-name { font-size: 1rem; font-weight: 800; }
.hire-prof { font-size: 0.72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent-primary); font-weight: 700; margin-top: 4px; }
.sidebar-checks { display: grid; gap: 10px; margin-top: 14px; }
.check-row { display:flex; align-items:center; gap:10px; font-size: .92rem; color: var(--text-secondary); }
.check-row input { accent-color: var(--accent-primary); }
.topbar { display:flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
.empty-hire { text-align:center; padding: 60px 20px; color: var(--text-muted); }
@media (max-width: 960px) { .page-shell { padding-inline: 20px; } .hire-layout { grid-template-columns: 1fr; } .filter-panel { position: static; } }
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-shape bg-shape-1"></div><div class="bg-shape bg-shape-2"></div><div class="bg-shape bg-shape-3"></div></div>
<div class="page">
  <nav>
    <a href="/" class="nav-logo">mmsgallery<small>SDU Student Exhibition</small></a>
    <ul class="nav-links"><li><a href="/">Home</a></li><li><a href="/gallery">Gallery</a></li><li><a href="/artists">Artists</a></li><li><a href="/hire">Hire</a></li><li><a href="/contact">Contact</a></li></ul>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <main class="page-shell">
    <div class="topbar reveal">
      <div>
        <div class="section-eyebrow" data-i18n="recruiterview">Recruiter view</div>
        <h1 class="section-title"><span data-i18n="hire">Hire</span> <span data-i18n="openToWorkTitle">Open to Work</span> <span data-i18n="students">students</span></h1>
        <p class="text-muted" style="max-width:720px;margin-top:10px" data-i18n="availableTalent">Browse students who are available for collaboration, internships, and project-based work.</p>
      </div>
      <select id="sortSelect" class="form-select" onchange="loadProfiles()">
        <option value="likes" data-i18n="mostLiked">Most liked</option>
        <option value="followers" data-i18n="mostFollowers">Most followers</option>
        <option value="newest" data-i18n="newest">Newest</option>
      </select>
    </div>

    <section class="hire-layout">
      <aside class="filter-panel reveal">
        <div class="section-eyebrow">Filters</div>
        <h2 class="section-title" style="font-size:1.5rem">Profession</h2>
        <div class="sidebar-checks" id="professionChecks"></div>
      </aside>
      <section class="result-panel reveal">
        <div style="display:flex;justify-content:space-between;align-items:end;gap:14px;flex-wrap:wrap;margin-bottom:18px">
          <div>
            <div class="section-eyebrow" data-i18n="openToWork">Open to Work</div>
            <h2 class="section-title" data-i18n="availableTalentTitle">Available Talent</h2>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()" data-i18n="clearFilters">Clear filters</button>
        </div>
        <div id="results" class="card-grid"></div>
      </section>
    </section>
  </main>

  <footer></footer>
</div>
<script src="/js/app.js"></script>
<script>
const professions = ['all','3D Modeler','3D/2D Animator','VFX Artist','Film Editor','Graphic Designer','UX/UI Designer','IoT Engineer','Interior & Architecture Designer','VR/AR Developer','Game Designer','Game Animator','Game Artist','Game Developer','Photographer','Other'];
let selected = new Set(['all']);

function renderChecks() {
  const el = document.getElementById('professionChecks');
  el.innerHTML = professions.map((item) => `
    <label class="check-row">
      <input type="checkbox" ${selected.has(item) ? 'checked' : ''} onchange='toggleProfession(${JSON.stringify(item)})'>
      <span>${t(item)}</span>
    </label>`).join('');
}

function toggleProfession(item) {
  if (item === 'all') {
    selected = new Set(['all']);
  } else {
    selected.delete('all');
    if (selected.has(item)) selected.delete(item); else selected.add(item);
    if (!selected.size) selected.add('all');
  }
  renderChecks();
  loadProfiles();
}

function clearFilters() {
  selected = new Set(['all']);
  document.getElementById('sortSelect').value = 'likes';
  renderChecks();
  loadProfiles();
}

async function loadProfiles() {
  const sort = document.getElementById('sortSelect').value;
  const profession = selected.has('all') ? 'all' : Array.from(selected).join(',');
  const response = await apiFetch(`/api/hire?sort=${encodeURIComponent(sort)}&profession=all`);
  const data = Array.isArray(response) ? response : (response.data || []);
  const filtered = selected.has('all') ? data : data.filter((profile) => selected.has(profile.profession));
  const results = document.getElementById('results');
  if (!filtered.length) {
    results.innerHTML = `<div class="empty-hire">${t('noProfilesMatched')}</div>`;
    return;
  }
  results.innerHTML = filtered.map((profile) => `
    <article class="hire-card" onclick="location.href='/profile/${profile.username || profile.uuid}'">
      <div class="hire-header">
        <img class="hire-avatar" src="${profile.avatar_url || 'https://placehold.co/120x120/2563eb/ffffff?text=' + encodeURIComponent(profile.name.charAt(0))}" alt="${profile.name}">
        <div>
          <div class="hire-name">${profile.name}</div>
          <div class="hire-prof">${t(profile.profession || 'Other')}</div>
          ${profile.is_open_to_work ? `<div class="badge badge-green" style="margin-top:8px">${t('openToWork')}</div>` : ''}
        </div>
      </div>
      <p class="text-muted" style="min-height:44px">${profile.bio || t('noBioProvided')}</p>
      <div class="profile-meta">
        <span class="meta-chip">${profile.works_count} ${t('works')}</span>
        <span class="meta-chip">${profile.likes_count} ${t('likes')}</span>
        <span class="meta-chip">${profile.followers_count} ${t('followers')}</span>
      </div>
    </article>`).join('');
}

renderChecks();
loadProfiles();
</script>
</body>
</html>
