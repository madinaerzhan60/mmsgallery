<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MMS Gallery - Profile</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
.profile-page { padding: 98px 32px 64px; max-width: 1400px; margin: 0 auto; }
.profile-shell { background: transparent; }

.profile-cover {
  position: relative;
  min-height: 220px;
  border-radius: 20px 20px 0 0;
  overflow: hidden;
  background: linear-gradient(135deg, #1e3a5f, #2563EB, #0ea5e9);
  border: 1px solid rgba(255,255,255,0.2);
}
.profile-cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2), transparent 38%),
              radial-gradient(circle at 70% 65%, rgba(255,255,255,0.12), transparent 42%);
}

.profile-head {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-top: none;
  border-radius: 0 0 20px 20px;
  box-shadow: var(--card-shadow);
  padding: 0 28px 28px;
}

.profile-top-row {
  display: grid;
  grid-template-columns: 1fr;
  justify-items: center;
  text-align: center;
  gap: 0;
}

.avatar-wrap {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #fff;
  background: var(--bg-tertiary);
  margin-top: -60px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
}
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.avatar-overlay {
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,0.55);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .25s ease;
  text-decoration: none;
  font-size: 1.2rem;
}
.avatar-wrap:hover .avatar-overlay { opacity: 1; }

.profile-title {
  font-family: var(--font-heading);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  font-style: normal;
  line-height: 1.1;
  margin: 18px 0 0;
  color: #111111;
}
.meta-line { margin-top: 10px; display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
.profession-pill {
  display: inline-flex;
  background: #2563EB;
  color: #fff;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: .74rem;
  letter-spacing: .11em;
  font-weight: 700;
  text-transform: uppercase;
}
.year-line { color: var(--text-muted); font-size: .9rem; }

.open-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #10B981;
  color: #fff;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: .74rem;
  letter-spacing: .08em;
  font-weight: 700;
  text-transform: uppercase;
}
.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 0 0 rgba(255,255,255,0.7);
  animation: pulse 1.7s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
  80% { box-shadow: 0 0 0 9px rgba(255,255,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
}

.bio-line {
  margin-top: 12px;
  color: #4b5563;
  line-height: 1.5;
  max-width: 640px;
  font-size: 0.98rem;
}

.action-row {
  margin-top: 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn-follow.following {
  background: #64748b;
  border-color: #64748b;
}

.stats-bar {
  margin: 16px auto 0;
  background: rgba(255, 255, 255, 0.72);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 14px;
}
.stat-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0;
  text-align: left;
  transition: transform .2s ease;
}
.stat-item:hover { transform: translateY(-1px); }
.stat-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(37, 99, 235, 0.1);
  color: #2563EB;
  flex: 0 0 auto;
  font-size: 0.9rem;
}
.stat-copy { display: grid; gap: 1px; }
.stat-value {
  font-family: var(--font-body);
  color: #111111;
  font-size: 1rem;
  font-weight: 800;
  line-height: 1;
}
.stat-label {
  margin-top: 0;
  color: var(--text-muted);
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 600;
  line-height: 1.1;
}

.links-row {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.link-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border-color);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: .85rem;
}
.link-pill:hover { color: #2563EB; border-color: #2563EB; }

.profile-body {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1.7fr .8fr;
  gap: 16px;
}

.left-card, .side-card {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  box-shadow: var(--card-shadow);
}
.left-card { padding: 18px; }
.side-stack { display: grid; gap: 14px; align-content: start; }
.side-card { padding: 16px; }

.sect-label {
  font-family: var(--font-body);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #2563EB;
  font-weight: 700;
}
.sect-title { margin-top: 8px; font-size: 1.7rem; font-weight: 800; }
.sect-title em { color: #2563EB; font-style: normal; }

.tab-row { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.cat-tab {
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: .78rem;
  cursor: pointer;
}
.cat-tab.active {
  border-color: #2563EB;
  color: #2563EB;
  background: rgba(37,99,235,0.08);
}

.masonry {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.art-card {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  min-height: 190px;
  background: var(--bg-tertiary);
}
.art-card img, .art-card video { width: 100%; height: 100%; object-fit: cover; display: block; }
.art-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0.15));
  opacity: 0;
  transition: opacity .25s ease;
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  color: #fff;
}
.art-card:hover .art-overlay { opacity: 1; }
.cat-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(15,23,42,0.6);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  font-size: .68rem;
  border-radius: 999px;
  padding: 4px 8px;
}
.likes-badge {
  position: absolute;
  right: 10px;
  bottom: 10px;
  background: rgba(15,23,42,0.7);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: .75rem;
  border-radius: 999px;
  padding: 4px 8px;
}

.kv { display: grid; gap: 8px; margin-top: 10px; }
.kv p { margin: 0; color: var(--text-secondary); font-size: .92rem; }
.kv b { color: var(--text-primary); }

.skill-tags { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
.skill-tag {
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: .75rem;
  color: var(--text-secondary);
}

.followers-mini { margin-top: 10px; }
.followers-row { display: flex; align-items: center; }
.mini-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid #fff;
  margin-left: -8px;
  background: var(--bg-tertiary);
  overflow: hidden;
}
.mini-avatar:first-child { margin-left: 0; }
.mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

.empty-box {
  margin-top: 16px;
  border: 1px dashed var(--border-color);
  border-radius: 12px;
  padding: 40px 16px;
  text-align: center;
}

@media (max-width: 980px) {
  .profile-page { padding: 92px 18px 50px; }
  .avatar-wrap { margin-inline: auto; }
  .action-row { justify-content: center; }
  .bio-line { margin-inline: auto; }
  .profile-body { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .stats-bar {
    width: 100%;
    justify-content: flex-start;
  }
}
</style>
</head>
<body>
<div class="bg-shapes">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>
</div>
<div class="page">
  <nav>
    <a href="/" class="nav-logo">mmsgallery<small>SDU Student Exhibition</small></a>
    <ul class="nav-links"><li><a href="/">Home</a></li><li><a href="/gallery">Gallery</a></li><li><a href="/artists">Artists</a></li><li><a href="/hire">Hire</a></li><li><a href="/contact">Contact</a></li></ul>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <main class="profile-page">
    <div id="content" style="text-align:center;padding:140px 20px;color:var(--text-muted);font-style: normal">Loading profile...</div>
  </main>
  <footer></footer>
</div>
<script src="/js/app.js"></script>
<script>
const uuid = location.pathname.split('/').pop();
let artistWorks = [];
let filteredWorks = [];
let followerPreview = { total: 0, followers: [] };

function isVideoArtwork(artwork) {
  const type = (artwork.file_type || '').toLowerCase();
  const category = (artwork.category || '').toLowerCase();
  return type === 'video' || category === 'video';
}

function categoryKey(v) { return (v || '').toLowerCase(); }

function skillsByProfession(profession) {
  const map = {
    'Graphic Designer': ['Figma', 'Illustrator', 'Branding', 'Typography'],
    'UX/UI Designer': ['Figma', 'Wireframing', 'Prototyping', 'User Research'],
    '3D Modeler': ['Blender', 'Cinema 4D', 'Substance', 'Rendering'],
    '3D/2D Animator': ['After Effects', 'Spine', 'Motion', 'Compositing'],
    'VFX Artist': ['Houdini', 'Nuke', 'Particles', 'Simulation'],
    'Film Editor': ['Premiere Pro', 'DaVinci Resolve', 'Color Grading', 'Storytelling'],
    'Game Designer': ['Unity', 'Level Design', 'Game Loops', 'Balance'],
    'Game Artist': ['Concept Art', 'Photoshop', 'Character Design', 'Environment Art'],
    'Game Animator': ['Rigging', 'Mocap', 'Unreal', 'Animation Curves'],
    'Game Developer': ['Unity', 'C#', 'Gameplay Systems', 'Optimization'],
    'Interior & Architecture Designer': ['AutoCAD', '3ds Max', 'Space Planning', 'Visualization'],
    'Photographer': ['Lightroom', 'Photoshop', 'Color', 'Composition']
  };
  return map[profession] || ['Creativity', 'Visual Thinking', 'Communication'];
}

function avatarFallback(name = 'U') {
  return `https://placehold.co/240x240/2563eb/ffffff?text=${encodeURIComponent(name.charAt(0).toUpperCase())}`;
}

function renderFollowersMini() {
  const row = document.getElementById('followersRow');
  const meta = document.getElementById('followersMeta');
  if (!row || !meta) return;

  row.innerHTML = followerPreview.followers.map((f) => `
    <a href="/profile/${f.uuid}" class="mini-avatar" title="${f.name}">
      <img src="${f.avatar_url || avatarFallback(f.name)}" alt="${f.name}">
    </a>
  `).join('');

  const more = Math.max(0, Number(followerPreview.total || 0) - Number(followerPreview.followers.length || 0));
  meta.textContent = more > 0 ? `+ ${more} more followers` : `${followerPreview.total || 0} followers`;
}

function renderWorksGrid() {
  const grid = document.getElementById('worksGrid');
  if (!grid) return;

  if (!filteredWorks.length) {
    const own = getUser()?.uuid === uuid;
    grid.innerHTML = `
      <div class="empty-box" style="grid-column:1 / -1">
        <div style="font-size:2rem;line-height:1">🖼️</div>
        <h3 style="margin-top:10px;font-size:1.25rem">${t('noWorksYet')}</h3>
        <p style="margin-top:6px;color:var(--text-muted)">${t('noPortfolioItemsYet')}</p>
        ${own ? `<a class="btn btn-primary" style="margin-top:12px" href="/dashboard?tab=submit">${t('uploadYourFirstWork')}</a>` : ''}
      </div>
    `;
    return;
  }

  grid.innerHTML = filteredWorks.map((w) => `
    <article class="art-card">
      ${isVideoArtwork(w) && w.file_url
        ? `<video src="${w.file_url}" poster="${w.thumbnail_url || w.image_url || ''}" muted loop playsinline preload="metadata"></video>`
        : (w.image_url
          ? `<img src="${w.image_url}" alt="${w.title}">`
          : artSVG(w.id || 1, 400, 300))}
      <span class="cat-badge">${t(w.category || 'Other')}</span>
      <div class="likes-badge">♡ ${w.likes || 0}</div>
      <div class="art-overlay">
        <div style="font-weight:700;font-size:1rem">${w.title || 'Untitled'}</div>
        <div style="font-size:.78rem;opacity:.9;margin-top:4px">${t(w.category || 'Other')} · ${w.likes || 0} ${t('likes')}</div>
      </div>
    </article>
  `).join('');

  grid.querySelectorAll('video').forEach((video) => {
    const card = video.closest('.art-card');
    if (!card) return;
    card.addEventListener('mouseenter', () => video.play().catch(() => {}));
    card.addEventListener('mouseleave', () => {
      video.pause();
      video.currentTime = 0;
    });
  });
}

function renderCategoryTabs(works) {
  const row = document.getElementById('categoryTabs');
  if (!row) return;

  const unique = Array.from(new Set(works.map((w) => w.category).filter(Boolean)));
  const tabs = ['All', ...unique];
  row.innerHTML = tabs.map((tab, idx) => `
    <button class="cat-tab ${idx === 0 ? 'active' : ''}" data-cat="${tab}">${tab}</button>
  `).join('');

  row.querySelectorAll('.cat-tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.cat-tab').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.getAttribute('data-cat');
      filteredWorks = cat === 'All'
        ? [...artistWorks]
        : artistWorks.filter((w) => categoryKey(w.category) === categoryKey(cat));
      renderWorksGrid();
    });
  });
}

async function toggleFollow(profileUuid) {
  const btn = document.getElementById('followBtn');
  if (!btn) return;
  try {
    const res = await apiFetch('/api/profiles/' + profileUuid + '/follow', { method: 'POST' });
    btn.textContent = res.following ? `${t('following')} ✓` : t('follow');
    btn.classList.toggle('following', !!res.following);
    const followersNode = document.getElementById('followersCount');
    if (followersNode) {
      const current = Number(followersNode.textContent || '0');
      followersNode.textContent = String(res.following ? current + 1 : Math.max(0, current - 1));
    }
    try {
      followerPreview = await apiFetch('/api/profiles/' + uuid + '/followers-preview');
      renderFollowersMini();
    } catch {}
    toast(res.following ? t('followed') : t('unfollowed'), 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function load() {
  try {
    const artist = await apiFetch('/api/profiles/' + uuid);
    artistWorks = artist.artworks || [];
    filteredWorks = [...artistWorks];

    const currentUser = getUser();
    const isOwnProfile = !!currentUser && currentUser.uuid === artist.uuid;
    const canFollow = !!currentUser && !isOwnProfile;
    const showEmail = !!currentUser;

    let followState = false;
    if (canFollow) {
      try {
        const r = await apiFetch('/api/profiles/' + uuid + '/follow-state');
        followState = !!r.following;
      } catch {}
    }

    try {
      followerPreview = await apiFetch('/api/profiles/' + uuid + '/followers-preview');
    } catch {
      followerPreview = { total: artist.followers_count || 0, followers: [] };
    }

    const skillTags = skillsByProfession(artist.profession || artist.major || 'Other');
    const joinedDate = new Date(artist.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'long' });
    document.getElementById('content').innerHTML = `
      <div class="profile-shell">
        <div class="profile-cover"></div>

        <section class="profile-head">
          <div class="profile-top-row">
            <div class="avatar-wrap">
              <img src="${artist.avatar_url || avatarFallback(artist.name)}" alt="${artist.name}">
              ${isOwnProfile ? `<a href="/settings" class="avatar-overlay" title="${t('editAvatar')}">📷</a>` : ''}
            </div>

            <div>
              <h1 class="profile-title">${artist.name}</h1>
              <div class="meta-line">
                <span class="profession-pill">${artist.profession || 'Other'}</span>
                <span class="year-line">${artist.year || 'Student'} · SDU University</span>
                ${artist.is_open_to_work ? `<span class="open-badge"><span class="pulse-dot"></span>${t('openToWork')}</span>` : ''}
              </div>
              <p class="bio-line">${artist.bio || t('noBioProvided')}</p>
            </div>
          </div>

          <div class="action-row">
            ${isOwnProfile
              ? `<a class="btn btn-primary" href="/settings">${t('editProfile')}</a>`
              : canFollow
                ? `<button class="btn btn-primary btn-follow ${followState ? 'following' : ''}" id="followBtn" onclick="toggleFollow('${artist.uuid}')">${followState ? `${t('following')} ✓` : t('follow')}</button>`
                : ''}
          </div>

          <section class="stats-bar" aria-label="Profile stats">
            <div class="stat-item"><span class="stat-icon">■</span><div class="stat-copy"><div class="stat-value">${artist.works_count || artistWorks.length}</div><div class="stat-label">${t('works')}</div></div></div>
            <div class="stat-item"><span class="stat-icon">♥</span><div class="stat-copy"><div class="stat-value">${artist.likes_count || 0}</div><div class="stat-label">${t('likes')}</div></div></div>
            <div class="stat-item"><span class="stat-icon">↺</span><div class="stat-copy"><div class="stat-value" id="followersCount">${artist.followers_count || 0}</div><div class="stat-label">${t('followers')}</div></div></div>
            <div class="stat-item"><span class="stat-icon">→</span><div class="stat-copy"><div class="stat-value">${artist.following_count || 0}</div><div class="stat-label">${t('following')}</div></div></div>
          </section>
        </section>

        <section class="links-row">
          ${artist.linkedin_url ? `<a class="link-pill" href="${artist.linkedin_url}" target="_blank" rel="noreferrer">🔗 LinkedIn ↗</a>` : ''}
          ${artist.portfolio_url ? `<a class="link-pill" href="${artist.portfolio_url}" target="_blank" rel="noreferrer">🎨 Portfolio ↗</a>` : ''}
        </section>

        <section class="profile-body">
          <div class="left-card">
            <div class="sect-label">${t('portfolio')}</div>
            <h2 class="sect-title">${t('allWorks')}</h2>
            <div class="tab-row" id="categoryTabs"></div>
            <div class="masonry" id="worksGrid"></div>
          </div>

          <aside class="side-stack">
            <article class="side-card">
              <div class="sect-label">${t('about')}</div>
              <div class="kv">
                <p><b>${t('bio')}:</b> ${artist.bio || t('noBioProvided')}</p>
                <p><b>${t('profession')}:</b> ${t(artist.profession || 'Other')}</p>
                <p><b>${t('yearOfStudy')}:</b> ${artist.year || t('notSpecified')}</p>
                <p><b>${t('memberSince')}:</b> ${joinedDate}</p>
              </div>
            </article>

            <article class="side-card">
              <div class="sect-label">SKILLS</div>
              <div class="skill-tags">
                ${skillTags.map((s) => `<span class="skill-tag">${s}</span>`).join('')}
              </div>
            </article>

            <article class="side-card">
              <div class="sect-label">CONTACT</div>
              <div class="kv">
                <p><b>LinkedIn:</b> ${artist.linkedin_url ? `<a href="${artist.linkedin_url}" target="_blank" rel="noreferrer">Open ↗</a>` : 'Not provided'}</p>
                <p><b>Email:</b> ${showEmail ? (artist.email || 'Not provided') : 'Visible to logged-in users only'}</p>
              </div>
            </article>

            <article class="side-card">
              <div class="sect-label">FOLLOWERS</div>
              <div class="followers-mini">
                <div class="followers-row" id="followersRow"></div>
                <p id="followersMeta" style="margin-top:8px;color:var(--text-muted);font-size:.86rem"></p>
              </div>
            </article>
          </aside>
        </section>
      </div>
    `;

    renderCategoryTabs(artistWorks);
    renderWorksGrid();
    renderFollowersMini();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="left-card" style="padding:42px;text-align:center">Profile not found.</div>';
  }
}

load();
</script>
</body>
</html>
