<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script>
(function(){
  try {
    var theme = localStorage.getItem("mms_theme");
    if (theme === "dark" || theme === "light") {
      document.documentElement.setAttribute("data-theme", theme);
    }
  } catch (e) {}
})();
</script>
<title>MMS Gallery - Profile</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
.profile-page { padding: 98px 32px 64px; max-width: 1400px; margin: 0 auto; }
.profile-shell { background: transparent; }

.profile-cover {
  position: relative;
  min-height: 220px;
  border-radius: 20px 20px 0 0;
  overflow: hidden;
  background: linear-gradient(135deg, #1e3a5f, #2563EB, #0ea5e9);
  border: 1px solid rgba(255,255,255,0.2);
}
.profile-cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.2), transparent 38%),
              radial-gradient(circle at 70% 65%, rgba(255,255,255,0.12), transparent 42%);
}
.profile-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 48%, rgba(0, 0, 0, 0.7) 100%);
  pointer-events: none;
}

.profile-head {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-top: none;
  border-radius: 0 0 20px 20px;
  box-shadow: var(--card-shadow);
  padding: 0 28px 28px;
}

.profile-top-row {
  display: grid;
  grid-template-columns: 1fr;
  justify-items: center;
  text-align: center;
  gap: 0;
}

.avatar-wrap {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 4px solid #fff;
  background: var(--bg-tertiary);
  margin-top: -60px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 28px rgba(15, 23, 42, 0.32), 0 0 0 1px rgba(255, 255, 255, 0.12), 0 0 22px rgba(255, 255, 255, 0.12);
}
.avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.avatar-overlay {
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,0.55);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .25s ease;
  text-decoration: none;
  font-size: 1.2rem;
}
.avatar-wrap:hover .avatar-overlay { opacity: 1; }

.profile-title {
  font-family: var(--font-heading);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  font-style: normal;
  line-height: 1.1;
  margin: 18px 0 0;
  color: var(--text-primary);
}
.meta-line { margin-top: 10px; display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
.profession-pill {
  display: inline-flex;
  background: #2563EB;
  color: #fff;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: .74rem;
  letter-spacing: .11em;
  font-weight: 700;
  text-transform: uppercase;
}
.year-line { color: var(--text-secondary); font-size: .9rem; }

.open-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #10B981;
  color: #fff;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: .74rem;
  letter-spacing: .08em;
  font-weight: 700;
  text-transform: uppercase;
}
.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 0 0 rgba(255,255,255,0.7);
  animation: pulse 1.7s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
  80% { box-shadow: 0 0 0 9px rgba(255,255,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
}

.bio-line {
  margin-top: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  max-width: 640px;
  font-size: 0.98rem;
}

.action-row {
  margin-top: 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn-follow.following {
  background: #64748b;
  border-color: #64748b;
}

.stats-bar {
  margin: 16px auto 0;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  box-shadow: none;
  backdrop-filter: blur(10px);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 14px;
}
.stat-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0;
  text-align: left;
  transition: transform .2s ease;
}
.stat-item.stat-clickable { cursor: pointer; }
.stat-item:hover { transform: translateY(-1px); }
.stat-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(37, 99, 235, 0.1);
  color: #2563EB;
  flex: 0 0 auto;
  font-size: 0.9rem;
}
.stat-copy { display: grid; gap: 1px; }
.stat-value {
  font-family: var(--font-body);
  color: var(--text-primary);
  font-size: 1rem;
  font-weight: 800;
  line-height: 1;
}
.stat-label {
  margin-top: 0;
  color: var(--text-secondary);
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 600;
  line-height: 1.1;
}

.links-row {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.link-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border-color);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  text-decoration: none;
  font-size: .85rem;
}
.link-pill:hover { color: #2563EB; border-color: #2563EB; }

[data-theme="dark"] .profile-head {
  background: rgba(18, 18, 18, 0.94);
}
[data-theme="dark"] .profile-title {
  color: #FFFFFF;
}
[data-theme="dark"] .year-line,
[data-theme="dark"] .bio-line,
[data-theme="dark"] .stat-label {
  color: #E5E5E5;
}
[data-theme="dark"] .stats-bar {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(229, 229, 229, 0.28);
}
[data-theme="dark"] .stat-value {
  color: #FFFFFF;
}
[data-theme="dark"] .avatar-wrap {
  box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.26), 0 0 26px rgba(255, 255, 255, 0.2);
}
[data-theme="dark"] .link-pill {
  color: #E5E5E5;
  border-color: rgba(229, 229, 229, 0.24);
  background: rgba(255, 255, 255, 0.1);
}

.profile-body {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1.7fr .8fr;
  gap: 16px;
}

.left-card, .side-card {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  box-shadow: var(--card-shadow);
}
.left-card { padding: 18px; }
.side-stack { display: grid; gap: 14px; align-content: start; }
.side-card { padding: 16px; }

.sect-label {
  font-family: var(--font-body);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #2563EB;
  font-weight: 700;
}
.sect-title { margin-top: 8px; font-size: 1.7rem; font-weight: 800; }
.sect-title em { color: #2563EB; font-style: normal; }

.tab-row { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.cat-tab {
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: .78rem;
  cursor: pointer;
}
.cat-tab.active {
  border-color: #2563EB;
  color: #2563EB;
  background: rgba(37,99,235,0.08);
}

.masonry {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  align-items: start;
}
.art-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border-color);
  background: var(--card-bg);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  aspect-ratio: 1 / 1.1;
  display: flex;
  flex-direction: column;
}
.art-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--card-shadow-hover);
  border-color: var(--accent-primary);
}
.art-card img, .art-card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.art-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 40px 14px 14px;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  opacity: 1;
  transform: translateY(0);
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  color: #fff;
}
.art-card:hover .art-overlay { opacity: 1; transform: translateY(0); }
.cat-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: .72rem;
  font-weight: 500;
  border-radius: 999px;
  padding: 4px 10px;
  backdrop-filter: blur(8px);
}
.likes-badge {
  position: absolute;
  right: 12px;
  top: 12px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: .75rem;
  font-weight: 500;
  border-radius: 999px;
  padding: 4px 10px;
  backdrop-filter: blur(8px);
}
.comments-badge {
  position: absolute;
  right: 12px;
  top: 44px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: .75rem;
  font-weight: 500;
  border-radius: 999px;
  padding: 4px 10px;
  backdrop-filter: blur(8px);
}
.art-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: #fff;
  word-break: break-word;
}
.art-meta {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.78);
  margin-top: 4px;
  word-break: break-word;
}
.art-desc {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.9);
  margin-top: 6px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.lightbox-engagement {
  padding: 0 20px 18px;
  display: grid;
  gap: 14px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  flex-shrink: 0;
}
.lightbox-stats-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
}
.engagement-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.engagement-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-primary);
  padding: 8px 12px;
  font-weight: 700;
  cursor: pointer;
}
.engagement-pill.primary {
  background: #2563EB;
  color: #fff;
  border-color: #2563EB;
}
.engagement-pill.active {
  background: rgba(37,99,235,0.08);
  color: #2563EB;
  border-color: #2563EB;
}
.comments-shell {
  border: 1px solid var(--border-color);
  border-radius: 16px;
  background: var(--bg-secondary);
  overflow: hidden;
}
.comments-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-color);
}
.comments-title { font-weight: 800; }
.comments-count { color: var(--text-muted); font-size: .85rem; }
.comments-list {
  display: grid;
  gap: 10px;
  padding: 14px 16px;
  max-height: 220px;
  overflow: auto;
}
.comment-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.comment-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-tertiary);
  flex: 0 0 auto;
}
.comment-card {
  flex: 1;
  border: 1px solid var(--border-light);
  background: var(--card-bg);
  border-radius: 14px;
  padding: 10px 12px;
}
.comment-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: .78rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.comment-author { font-weight: 700; color: var(--text-primary); }
.comment-body { color: var(--text-secondary); line-height: 1.45; white-space: pre-wrap; }
.comment-empty { color: var(--text-muted); padding: 6px 2px; }
.comment-form {
  display: grid;
  gap: 10px;
  padding: 14px 16px 16px;
  border-top: 1px solid var(--border-color);
}
.comment-input {
  min-height: 90px;
  resize: vertical;
}
.comment-login-note {
  padding: 14px 16px 16px;
  border-top: 1px solid var(--border-color);
  color: var(--text-muted);
}

.kv { display: grid; gap: 8px; margin-top: 10px; }
.kv p { margin: 0; color: var(--text-secondary); font-size: .92rem; }
.kv b { color: var(--text-primary); }

.skill-tags { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
.skill-tag {
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: .75rem;
  color: var(--text-secondary);
}

.followers-mini { margin-top: 10px; }
.followers-row { display: flex; align-items: center; }
.mini-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid #fff;
  margin-left: -8px;
  background: var(--bg-tertiary);
  overflow: hidden;
}
.mini-avatar:first-child { margin-left: 0; }
.mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

.modal-layer {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.68);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 220;
}
.modal-layer.open { display: flex; }
.modal-open { overflow: hidden; }
.modal-card {
  width: min(820px, 96vw);
  max-height: min(85vh, 920px);
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  box-shadow: var(--card-shadow-hover);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.modal-title {
  font-size: 1.05rem;
  font-weight: 800;
}
.modal-body {
  padding: 18px 20px 20px;
  max-height: calc(82vh - 70px);
  overflow: auto;
}
.followers-list {
  display: grid;
  gap: 10px;
}
.follower-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 12px 14px;
  border: 1px solid var(--border-color);
  border-radius: 14px;
  background: var(--bg-secondary);
}
.follower-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.follower-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-tertiary);
  flex: 0 0 auto;
}
.follower-name {
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;

}
.lightbox-media-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;

.lightbox-media-wrap img,
.lightbox-media-wrap video {
  display: block;
  width: 100%;
  height: 100%;
  max-width: 100%;

  object-fit: contain;

}
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 1px solid var(--border-color);
  background: rgba(255,255,255,0.94);
  color: #111111;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.05rem;
}
.lightbox-prev { left: 18px; }
.lightbox-next { right: 18px; }
.lightbox-meta {
  padding: 12px 20px 0;
  display: grid;
  gap: 6px;
  text-align: center;
  flex-shrink: 0;
}
.lightbox-title { font-size: 1.1rem; font-weight: 800; }
.lightbox-counter { color: var(--text-muted); font-size: .86rem; }
.lightbox-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;

  display: flex;
  flex-direction: column;
}
.lightbox-close {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-primary);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.empty-box {
  margin-top: 16px;
  border: 1px dashed var(--border-color);
  border-radius: 12px;
  padding: 40px 16px;
  text-align: center;
}

@media (max-width: 980px) {
  .profile-page { padding: 92px 18px 50px; }
  .avatar-wrap { margin-inline: auto; }
  .action-row { justify-content: center; }
  .bio-line { margin-inline: auto; }
  .profile-body { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .stats-bar {
    width: 100%;
    justify-content: flex-start;
  }
}
</style>
</head>

<script>
const profileSlug = location.pathname.split('/').pop();
let artistWorks = [];
let filteredWorks = [];
let lightboxIndex = -1;
let lightboxActiveUuid = null;
let lightboxRequestSeq = 0;
let lightboxState = null;

function isVideoArtwork(artwork) {
  const type = (artwork.file_type || '').toLowerCase();
  const category = (artwork.category || '').toLowerCase();
  return type === 'video' || category === 'video';
}

function categoryKey(v) { return (v || '').toLowerCase(); }

function skillsByProfession(profession) {
  const map = {
    'Graphic Designer': ['Figma', 'Illustrator', 'Branding', 'Typography'],
    'UX/UI Designer': ['Figma', 'Wireframing', 'Prototyping', 'User Research'],
    '3D Modeler': ['Blender', 'Cinema 4D', 'Substance', 'Rendering'],
    '3D/2D Animator': ['After Effects', 'Spine', 'Motion', 'Compositing'],
    'VFX Artist': ['Houdini', 'Nuke', 'Particles', 'Simulation'],
    'Film Editor': ['Premiere Pro', 'DaVinci Resolve', 'Color Grading', 'Storytelling'],
    'Game Designer': ['Unity', 'Level Design', 'Game Loops', 'Balance'],
    'Game Artist': ['Concept Art', 'Photoshop', 'Character Design', 'Environment Art'],
    'Game Animator': ['Rigging', 'Mocap', 'Unreal', 'Animation Curves'],
    'Game Developer': ['Unity', 'C#', 'Gameplay Systems', 'Optimization'],
    'Interior & Architecture Designer': ['AutoCAD', '3ds Max', 'Space Planning', 'Visualization'],
    'Photographer': ['Lightroom', 'Photoshop', 'Color', 'Composition']
  };
  return map[profession] || ['Creativity', 'Visual Thinking', 'Communication'];
}

function profileUiText(key) {
  const lang = typeof getLanguage === 'function' ? getLanguage() : 'en';
  const dict = {
    en: {
      skills: 'SKILLS',
      contact: 'CONTACT',
      openLink: 'Open ↗',
      notProvided: 'Not provided',
      visibleToLoggedInUsersOnly: 'Visible to logged-in users only',
      followersTitle: 'FOLLOWERS',
      followingTitle: 'FOLLOWING',
      portfolioTitle: 'PORTFOLIO',
      profileButton: 'Profile',
      back: 'Back',

function avatarFallback(name = 'U') {
  return `https://placehold.co/240x240/2563eb/ffffff?text=${encodeURIComponent(name.charAt(0).toUpperCase())}`;
}

function coverBackgroundForArtist(artist) {
  const coverPresets = {
    preset_1: 'linear-gradient(135deg, #1e3a5f, #2563EB)',
    preset_2: 'linear-gradient(135deg, #0f172a, #7c3aed)',
    preset_3: 'linear-gradient(135deg, #064e3b, #10b981)',
    preset_4: 'linear-gradient(135deg, #7f1d1d, #ef4444)',
    preset_5: 'linear-gradient(135deg, #1c1917, #d97706)'
  };
  const fallback = coverPresets.preset_1;
  const rawCover = String(artist?.cover_url || '').trim();
  if (rawCover) {
    const safeUrl = /^(https?:|data:|blob:)/i.test(rawCover) || rawCover.startsWith('/')
      ? rawCover
      : `/${rawCover}`;
    return `center / cover no-repeat url('${safeUrl}')`;
  }

  const preset = String(artist?.cover_gradient || '').trim();
  if (preset) return coverPresets[preset] || preset;
  return fallback;
}

function escapeHtml(value = '') {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderWorksGrid() {
  const grid = document.getElementById('worksGrid');
  if (!grid) return;

  if (!filteredWorks.length) {
    const own = getUser()?.uuid === profileSlug || getUser()?.username === profileSlug;
    grid.innerHTML = `
      <div class="empty-box" style="grid-column:1 / -1">
        <div style="font-size:2rem;line-height:1">🖼️</div>
        <h3 style="margin-top:10px;font-size:1.25rem">${t('noWorksYet')}</h3>
        <p style="margin-top:6px;color:var(--text-muted)">${t('noPortfolioItemsYet')}</p>
        ${own ? `<a class="btn btn-primary" style="margin-top:12px" href="/dashboard?tab=submit">${t('uploadYourFirstWork')}</a>` : ''}
      </div>
    `;
    return;
  }

  grid.innerHTML = filteredWorks.map((w) => `
    <article class="art-card" role="button" tabindex="0" data-work-id="${w.uuid || w.id}">
      ${isVideoArtwork(w) && w.file_url
        ? `<video src="${w.file_url}" poster="${w.thumbnail_url || w.image_url || ''}" muted loop playsinline preload="metadata"></video>`
        : (w.image_url
          ? `<img src="${w.image_url}" alt="${w.title}">`
          : artSVG(w.id || 1, 400, 300))}
      <span class="cat-badge">${t(w.category || 'Other')}</span>
      <div class="likes-badge">♡ ${w.likes || 0}</div>
      <div class="comments-badge">💬 ${w.comments || 0}</div>
      <div class="art-overlay">
        <div class="art-title">${w.title || 'Untitled'}</div>
        <div class="art-meta">${t(w.category || 'Other')} · ${w.likes || 0} ${t('likes')} · ${w.comments || 0} ${t('comments')}</div>
        <div class="art-desc">${w.description ? escapeHtml(w.description) : ''}</div>
      </div>
    </article>
  `).join('');

  grid.querySelectorAll('.art-card').forEach((card) => {
    const video = card.querySelector('video');
    card.addEventListener('click', () => openLightboxByWorkId(card.getAttribute('data-work-id')));
    card.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openLightboxByWorkId(card.getAttribute('data-work-id'));
      }
    });
    if (video) {
      card.addEventListener('mouseenter', () => video.play().catch(() => {}));
      card.addEventListener('mouseleave', () => {
        video.pause();
        video.currentTime = 0;
      });
    }
  });
}

function renderCategoryTabs(works) {
  const row = document.getElementById('categoryTabs');
  if (!row) return;

  const unique = Array.from(new Set(works.map((w) => w.category).filter(Boolean)));
  const tabs = ['All', ...unique];
  row.innerHTML = tabs.map((tab, idx) => `
    <button class="cat-tab ${idx === 0 ? 'active' : ''}" data-cat="${tab}">${tab}</button>
  `).join('');

  row.querySelectorAll('.cat-tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.cat-tab').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.getAttribute('data-cat');
      filteredWorks = cat === 'All'
        ? [...artistWorks]
        : artistWorks.filter((w) => categoryKey(w.category) === categoryKey(cat));
      renderWorksGrid();
    });
  });
}

async function toggleFollow(profileUuid) {
  const btn = document.getElementById('followBtn');
  if (!btn) return;
  try {
    const res = await apiFetch('/api/profiles/' + profileUuid + '/follow', { method: 'POST' });
    btn.textContent = res.following ? `${t('following')} ✓` : t('follow');
    btn.classList.toggle('following', !!res.following);
    const followersNode = document.getElementById('followersCount');
    if (followersNode) {
      const current = Number(followersNode.textContent || '0');
      followersNode.textContent = String(res.following ? current + 1 : Math.max(0, current - 1));
    }
    toast(res.following ? t('followed') : t('unfollowed'), 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

      <div class="follower-row">
        <div class="follower-meta">
          <img class="follower-avatar" src="${item.avatar_url || avatarFallback(item.name)}" alt="${item.name}">

function openConnectionsModal(kind) {
  const modal = document.getElementById(kind + 'Modal');
  const body = document.getElementById(kind + 'ModalBody');
  const previewEndpoint = `/api/profiles/${profileSlug}/${kind}-preview`;
  const listEndpoint = `/api/profiles/${profileSlug}/${kind}`;
  const emptyText = kind === 'followers'
    ? (t('noFollowersYet') || 'No followers yet.')
    : (t('noFollowingYet') || 'No following yet.');

  modal.classList.add('open');
  body.innerHTML = `<div style="color:var(--text-muted);padding:8px 0">${t('loading') || 'Loading...'}</div>`;

  const render = (data) => {
    const items = data[kind] || [];
    body.innerHTML = renderConnections(items, emptyText);
  };

  apiFetch(listEndpoint)
    .then(render)
    .catch(() => {
      apiFetch(previewEndpoint)
        .then(render)
        .catch((error) => {
          body.innerHTML = `<div style="color:var(--danger);padding:8px 0">${error.message}</div>`;
        });
    });
}

function openLightboxByWorkId(workId) {
  const index = artistWorks.findIndex((work) => String(work.uuid || work.id) === String(workId));
  if (index < 0) return;
  lightboxIndex = index;
  lightboxActiveUuid = artistWorks[index].uuid || null;
  lightboxState = null;
  document.getElementById('lightboxModal').classList.add('open');
  document.body.classList.add('modal-open');
  renderLightbox();
  loadLightboxEngagement(artistWorks[index]);
}

function closeLightbox() {
  const modal = document.getElementById('lightboxModal');
  modal.classList.remove('open');
  document.body.classList.remove('modal-open');
  const media = modal.querySelector('video');
  if (media) {
    media.pause();
    media.currentTime = 0;
  }
}

function moveLightbox(step) {
  if (!artistWorks.length) return;
  lightboxIndex = (lightboxIndex + step + artistWorks.length) % artistWorks.length;
  lightboxActiveUuid = artistWorks[lightboxIndex].uuid || null;
  lightboxState = null;
  renderLightbox();
  loadLightboxEngagement(artistWorks[lightboxIndex]);
}

function renderLightbox() {
  const item = artistWorks[lightboxIndex];
  if (!item) return;
  const mediaWrap = document.getElementById('lightboxMedia');
  const titleNode = document.getElementById('lightboxTitle');
  const counterNode = document.getElementById('lightboxCounter');
  const total = artistWorks.length;
  const currentNumber = lightboxIndex + 1;

  titleNode.textContent = item.title || 'Untitled';
  counterNode.textContent = `${currentNumber} из ${total}`;

  if (isVideoArtwork(item) && item.file_url) {
    mediaWrap.innerHTML = `<video src="${item.file_url}" poster="${item.thumbnail_url || item.image_url || ''}" controls autoplay playsinline preload="metadata"></video>`;
  } else if (item.image_url) {
    mediaWrap.innerHTML = `<img src="${item.image_url}" alt="${item.title || 'Artwork'}">`;
  } else {
    mediaWrap.innerHTML = artSVG(item.id || 1, 1100, 760);
  }

  renderLightboxEngagement(item);
}

function renderLightboxEngagement(item) {
  const node = document.getElementById('lightboxEngagement');
  if (!node) return;

  if (!lightboxState) {
    node.innerHTML = `<div style="color:var(--text-muted);padding:2px 0">${t('loading') || 'Loading...'}</div>`;
    return;
  }

  const currentUser = getUser();
  const likes = Number(lightboxState.likes || item.likes || 0);
  const comments = Number(lightboxState.comments || item.comments || 0);
  const liked = !!lightboxState.liked;
  const commentsList = lightboxState.commentsList || [];

  node.innerHTML = `
    <div class="lightbox-stats-row">
      <div class="engagement-pills">
        <button type="button" class="engagement-pill ${liked ? 'active' : ''} ${currentUser ? '' : 'primary'}" id="lightboxLikeBtn" ${currentUser ? '' : 'disabled'} onclick="toggleLightboxLike()">${liked ? '♥' : '♡'} ${likes} ${t('likes')}</button>
        <div class="engagement-pill">💬 ${comments} ${t('comments')}</div>
      </div>
      <div style="color:var(--text-muted);font-size:.86rem">${currentUser ? t('writeComment') : `${t('loginToComment')} · ${t('signIn')}`}</div>
    </div>

    <section class="comments-shell">
      <div class="comments-head">
        <div class="comments-title">${t('comments')}</div>
        <div class="comments-count">${comments}</div>
      </div>
      <div class="comments-list" id="lightboxCommentsList">
        ${commentsList.length ? commentsList.map((comment) => `
          <div class="comment-item">
            <img class="comment-avatar" src="${comment.avatar_url || avatarFallback(comment.name)}" alt="${escapeHtml(comment.name)}">
            <div class="comment-card">
              <div class="comment-meta">
                <span class="comment-author">${escapeHtml(comment.name)}</span>
                <span>${new Date(comment.created_at).toLocaleDateString()}</span>
              </div>
              <div class="comment-body">${escapeHtml(comment.content).replace(/\n/g, '<br>')}</div>
            </div>
          </div>
        `).join('') : `<div class="comment-empty">${t('noCommentsYet')}</div>`}
      </div>
      ${currentUser
        ? `<form class="comment-form" onsubmit="submitLightboxComment(event)">
            <textarea id="lightboxCommentInput" class="form-textarea comment-input" maxlength="500" placeholder="${t('writeComment')}"></textarea>
            <button class="btn btn-primary" type="submit">${t('postComment')}</button>
          </form>`
        : `<div class="comment-login-note">${t('loginToComment')} <a href="/auth">${t('signIn')}</a>.</div>`}
    </section>
  `;
}

async function loadLightboxEngagement(item) {
  const artworkUuid = item?.uuid;
  if (!artworkUuid) return;
  const seq = ++lightboxRequestSeq;

  try {
    const [artwork, comments] = await Promise.all([
      apiFetch('/api/artworks/' + artworkUuid),
      apiFetch('/api/artworks/' + artworkUuid + '/comments')
    ]);
    if (seq !== lightboxRequestSeq || lightboxActiveUuid !== artworkUuid) return;
    lightboxState = {
      likes: artwork.likes || 0,
      comments: artwork.comments || comments.length || 0,
      liked: !!artwork.liked,
      commentsList: comments || []
    };
    renderLightboxEngagement(item);
  } catch (error) {
    if (seq !== lightboxRequestSeq || lightboxActiveUuid !== artworkUuid) return;
    lightboxState = {
      likes: item.likes || 0,
      comments: item.comments || 0,
      liked: false,
      commentsList: []
    };
    renderLightboxEngagement(item);
  }
}

async function toggleLightboxLike() {
  const item = artistWorks[lightboxIndex];
  if (!item?.uuid) return;
  try {
    const res = await apiFetch('/api/artworks/' + item.uuid + '/like', { method: 'POST' });
    lightboxState = {
      ...(lightboxState || {}),
      likes: res.likes,
      liked: !!res.liked
    };
    item.likes = res.likes;
    renderLightboxEngagement(item);
    renderWorksGrid();
  } catch (error) {
    toast(error.message, 'error');
  }
}

async function submitLightboxComment(event) {
  event.preventDefault();
  const item = artistWorks[lightboxIndex];
  if (!item?.uuid) return;
  const input = document.getElementById('lightboxCommentInput');
  const content = input.value.trim();
  if (!content) return;

  try {
    await apiFetch('/api/artworks/' + item.uuid + '/comments', {
      method: 'POST',
      body: JSON.stringify({ content })
    });
    input.value = '';
    loadLightboxEngagement(item);
    toast(t('commentPosted') || 'Comment posted', 'success');
  } catch (error) {
    toast(error.message, 'error');
  }
}

async function load() {
  try {
    let artist;
    try {
      artist = await apiFetch('/api/profiles/' + profileSlug);

      // Fallback for legacy links/data where the profile endpoint cannot resolve slug.
      artist = await apiFetch('/api/artists/' + profileSlug);

    if (artist?.username && artist.username !== profileSlug) {
      history.replaceState(null, '', `/profile/${artist.username}`);

    artistWorks = artist.artworks || [];
    filteredWorks = [...artistWorks];

    document.getElementById('content').innerHTML = `

              <h1 class="profile-title">${artist.name}</h1>
              <div class="meta-line">

                <span class="year-line">${artist.year || 'Student'} · SDU University</span>
                ${artist.is_open_to_work ? `<span class="open-badge"><span class="pulse-dot"></span>${t('openToWork')}</span>` : ''}

          </div>

          <div class="action-row">
            ${isOwnProfile
              ? `<a class="btn btn-primary" href="/settings">${t('editProfile')}</a>`

            <div class="stat-item"><span class="stat-icon">♥</span><div class="stat-copy"><div class="stat-value">${artist.likes_count || 0}</div><div class="stat-label">${t('likes')}</div></div></div>
