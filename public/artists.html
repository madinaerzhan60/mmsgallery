<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script>
(function(){
  try {
    var theme = localStorage.getItem("mms_theme");
    if (theme === "dark" || theme === "light") {
      document.documentElement.setAttribute("data-theme", theme);
    }
  } catch (e) {}
})();
</script>
<title>MMS Gallery - Artists</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
.page-shell { padding: 120px 48px 72px; }
.hero-strip {
  max-width: 1200px;
  margin: 0 auto 24px;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.hero-copy h1 { font-size: clamp(2.4rem, 5vw, 4.6rem); line-height: 1.02; margin-bottom: 12px; }
.hero-copy p { color: var(--text-muted); max-width: 640px; font-size: 1.05rem; }
.artist-toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
.profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
.profile-card {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 22px;
  transition: all 0.3s ease;
  cursor: pointer;
}
.profile-card:hover { transform: translateY(-4px); border-color: var(--accent-primary); box-shadow: var(--card-shadow-hover); }
.profile-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.profile-avatar { width: 62px; height: 62px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-primary); background: var(--bg-tertiary); }
.profile-name { font-size: 1rem; font-weight: 800; }
.profile-prof { color: var(--accent-primary); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; margin-top: 4px; }
.profile-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.meta-chip { padding: 6px 10px; border-radius: 999px; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.78rem; }
.top-section { margin-bottom: 32px; }
.top-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.top-card { background: linear-gradient(135deg, var(--card-bg), color-mix(in srgb, var(--card-bg) 82%, var(--accent-light) 18%)); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 22px; }
.rank-badge { display: inline-flex; width: 34px; height: 34px; align-items: center; justify-content: center; border-radius: 50%; background: var(--accent-primary); color: #fff; font-weight: 800; margin-bottom: 14px; }
@media (max-width: 900px) { .page-shell { padding-inline: 20px; } .top-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-shape bg-shape-1"></div><div class="bg-shape bg-shape-2"></div><div class="bg-shape bg-shape-3"></div></div>
<div class="page">
  <nav>
    <a href="/" class="nav-logo">mmsgallery<small>SDU Student Exhibition</small></a>
    <ul class="nav-links"><li><a href="/">Home</a></li><li><a href="/gallery">Gallery</a></li><li><a href="/artists">Artists</a></li><li><a href="/hire">Hire</a></li><li><a href="/contact">Contact</a></li></ul>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <main class="page-shell">
    <section class="hero-strip reveal">
      <div class="hero-copy">
        <div class="section-eyebrow" data-i18n="community">Community</div>
        <h1 data-i18n="artists">Artists</h1>
        <p data-i18n="browseCreators">Browse every student profile, compare creative output, and open a full public profile in one click.</p>
      </div>
      <div class="artist-toolbar">
        <select id="sortSelect" class="form-select" onchange="loadArtists()">
          <option value="newest" data-i18n="newest">Newest</option>
          <option value="likes" data-i18n="mostLiked">Most liked</option>
          <option value="followers" data-i18n="mostFollowers">Most followers</option>
        </select>
      </div>
    </section>

    <section class="top-section reveal">
      <div class="section-eyebrow" data-i18n="leaderboard">Leaderboard</div>
      <h2 class="section-title" style="margin-bottom:18px" data-i18n="topArtists">Top Artists</h2>
      <div class="top-grid" id="topArtistsGrid"></div>
    </section>

    <section class="reveal">
      <div style="display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap">
          <div>
          <div class="section-eyebrow" data-i18n="allProfiles">All profiles</div>
          <h2 class="section-title" data-i18n="browseCreators">Browse <span>Creators</span></h2>
        </div>
        <div class="filters" id="professionFilters"></div>
      </div>
      <div class="profile-grid" id="artistsGrid"></div>
    </section>
  </main>

  <footer></footer>
</div>
<script src="/js/app.js"></script>
<script>
const professions = ['all','3D Modeler','3D/2D Animator','VFX Artist','Film Editor','Graphic Designer','UX/UI Designer','IoT Engineer','Interior & Architecture Designer','VR/AR Developer','Game Designer','Game Animator','Game Artist','Game Developer','Photographer','Other'];
let currentProfession = 'all';

function renderProfessionFilters() {
  const el = document.getElementById('professionFilters');
  el.innerHTML = professions.map((profession) => `<button class="flt ${profession === currentProfession ? 'active' : ''}" onclick='setProfession(${JSON.stringify(profession)})'>${t(profession)}</button>`).join('');
}

async function loadTopArtists() {
  const data = await apiFetch('/api/artists/top');
  document.getElementById('topArtistsGrid').innerHTML = data.map((artist, index) => `
    <article class="top-card" onclick="location.href='/profile/${artist.username || artist.uuid}'">
      <div class="rank-badge">${['🥇','🥈','🥉'][index] || index + 1}</div>
      <div class="profile-top">
        <img class="profile-avatar" src="${artist.avatar_url || 'https://placehold.co/120x120/1d4ed8/ffffff?text=' + encodeURIComponent(artist.name.charAt(0))}" alt="${artist.name}">
        <div>
          <div class="profile-name">${artist.name}</div>
          <div class="profile-prof">${t(artist.profession || 'Other')}</div>
        </div>
      </div>
      <div class="profile-meta">
        <span class="meta-chip">${artist.works_count} ${t('works')}</span>
        <span class="meta-chip">${artist.likes_count} ${t('likes')}</span>
        <span class="meta-chip">${artist.followers_count} ${t('followers')}</span>
      </div>
    </article>`).join('');
}

async function loadArtists() {
  const sort = document.getElementById('sortSelect').value;
  const data = await apiFetch(`/api/profiles?sort=${encodeURIComponent(sort)}&profession=${encodeURIComponent(currentProfession)}`);
  document.getElementById('artistsGrid').innerHTML = data.map((artist) => `
    <article class="profile-card reveal" onclick="location.href='/profile/${artist.username || artist.uuid}'">
      <div class="profile-top">
        <img class="profile-avatar" src="${artist.avatar_url || 'https://placehold.co/120x120/2563eb/ffffff?text=' + encodeURIComponent(artist.name.charAt(0))}" alt="${artist.name}">
        <div>
          <div class="profile-name">${artist.name}</div>
          <div class="profile-prof">${t(artist.profession || 'Other')}</div>
        </div>
      </div>
      <p class="text-muted">${artist.bio || t('noBioProvided')}</p>
      <div class="profile-meta">
        <span class="meta-chip">${artist.works_count} ${t('works')}</span>
        <span class="meta-chip">${artist.likes_count} ${t('likes')}</span>
        <span class="meta-chip">${artist.followers_count} ${t('followers')}</span>
      </div>
      ${artist.is_open_to_work ? `<div class="badge badge-green" style="margin-top:14px">${t('openToWork')}</div>` : ''}
    </article>`).join('');
  initReveal();
}

function setProfession(profession) {
  currentProfession = profession;
  renderProfessionFilters();
  loadArtists();
}

(async function init() {
  renderProfessionFilters();
  await loadTopArtists();
  await loadArtists();
})();
</script>
</body>
</html>
