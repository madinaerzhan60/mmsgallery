<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<script>
(function(){
  try {
    var theme = localStorage.getItem("mms_theme");
    if (theme === "dark" || theme === "light") {
      document.documentElement.setAttribute("data-theme", theme);
    }
  } catch (e) {}
})();
</script>
<title>MMS Gallery - Sign In</title>
<link rel="stylesheet" href="/css/theme.css">
<style>
.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 20px 60px;
}
.auth-card {
  width: 100%;
  max-width: 440px;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  box-shadow: var(--card-shadow-hover);
}
.auth-logo-area {
  text-align: center;
  margin-bottom: 32px;
}
.auth-logo {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--accent-primary);
  letter-spacing: -0.02em;
}
.auth-subtitle { 
  font-size: 0.95rem; 
  color: var(--text-muted); 
  margin-top: 8px; 
}
.tabs { 
  display: flex; 
  gap: 0; 
  margin-bottom: 28px; 
  background: var(--bg-secondary); 
  border-radius: var(--radius-sm); 
  padding: 4px; 
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s ease;
  color: var(--text-muted);
  border: none;
  background: none;
}
.tab.active { 
  background: var(--accent-primary); 
  color: white; 
}
.form-wrap { display: flex; flex-direction: column; gap: 18px; }
.auth-footer { 
  text-align: center; 
  margin-top: 24px; 
  font-size: 0.9rem; 
  color: var(--text-muted); 
}
.auth-footer a { color: var(--accent-primary); text-decoration: none; font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; }
.divider-line { 
  display: flex; 
  align-items: center; 
  gap: 12px; 
  margin: 8px 0; 
}
.divider-line span { flex: 1; height: 1px; background: var(--border-color); }
.divider-line p { font-size: 0.75rem; color: var(--text-muted); }
.field-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  align-items: start;
}
.field-row > .form-group {
  min-width: 0;
}
.field-row .form-input,
.field-row .form-select,
.field-row .form-textarea {
  width: 100%;
  max-width: 100%;
}
.error-msg { 
  color: var(--danger); 
  font-size: 0.85rem; 
  font-weight: 500;
  display: none;
  padding: 12px;
  background: rgba(239, 68, 68, 0.1);
  border-radius: var(--radius-sm);
}
.error-msg.show { display: block; }
.submit-btn { width: 100%; padding: 14px; font-size: 0.9rem; margin-top: 4px; }
</style>
</head>
<body>
<div class="bg-shapes">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>
</div>
<div class="page">
  <nav>
    <a href="/" class="nav-logo">mmsgallery<small>SDU Student Exhibition</small></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/gallery">Gallery</a></li>
      <li><a href="/artists">Artists</a></li>
      <li><a href="/hire">Hire</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo-area">
        <div class="auth-logo">mmsgallery</div>
        <div class="auth-subtitle">SDU Student Exhibition Platform</div>
      </div>
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">Sign Up</button>
      </div>
      <div id="errorMsg" class="error-msg"></div>

      <!-- Login form -->
      <div id="loginForm" class="form-wrap">
        <div class="form-group">
          <label class="form-label">Email or Username</label>
          <input class="form-input" type="text" id="loginIdentifier" placeholder="your@university.edu or username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary submit-btn" onclick="doLogin()" data-i18n="signIn">Sign In</button>
        <div class="divider-line"><span></span><p data-i18n="or">or</p><span></span></div>
        <button class="btn btn-ghost submit-btn" onclick="switchTab('register')" data-i18n="createAccount">Create Account</button>
      </div>

      <!-- Register form -->
      <div id="registerForm" class="form-wrap" style="display:none">
        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" id="regName" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" id="regUsername" placeholder="daniyar_m" autocomplete="username">
          </div>
        </div>
        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Year</label>
            <select class="form-select" id="regYear">
              <option value="" data-i18n="selectYear">Select Year</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
              <option value="Master">Master</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Profession / Specialization</label>
            <select class="form-select" id="regMajor">
            <option value="" data-i18n="selectProfession">Select Profession</option>
            <option>3D Modeler</option>
            <option>3D/2D Animator</option>
            <option>VFX Artist</option>
            <option>Film Editor</option>
            <option>Graphic Designer</option>
            <option>UX/UI Designer</option>
            <option>IoT Engineer</option>
            <option>Interior & Architecture Designer</option>
            <option>VR/AR Developer</option>
            <option>Game Designer</option>
            <option>Game Animator</option>
            <option>Game Artist</option>
            <option>Game Developer</option>
            <option>Photographer</option>
            <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" id="regEmail" placeholder="your@university.edu" autocomplete="email">
        </div>
        <div class="field-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="regPass" placeholder="Minimum 6 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm</label>
            <input class="form-input" type="password" id="regPass2" placeholder="Repeat password" autocomplete="new-password">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Short Bio (optional)</label>
          <textarea class="form-textarea" id="regBio" placeholder="Tell us about yourself"></textarea>
        </div>
        <button class="btn btn-primary submit-btn" onclick="doRegister()" data-i18n="createAccount">Create Account</button>
        <button class="btn btn-ghost submit-btn" onclick="switchTab('login')">Already have an account</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if (isLoggedIn()) {
  location.href = '/dashboard';
}

function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  hideError();
}

function showError(message) {
  const box = document.getElementById('errorMsg');
  box.textContent = message;
  box.classList.add('show');
}

function hideError() {
  const box = document.getElementById('errorMsg');
  box.classList.remove('show');
  box.textContent = '';
}

async function doLogin() {
  hideError();
  const login = document.getElementById('loginIdentifier').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!login || !password) {
    showError('Email/username and password are required');
    return;
  }

  try {
    const res = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ login, password })
    });
    setAuth(res.token, res.user);
    toast(`${t('welcomeBack')}, ${res.user.name}!`, 'success');
    setTimeout(() => location.href = '/dashboard', 800);
  } catch (e) {
    showError(e.message);
  }
}

async function doRegister() {
  hideError();
  const name = document.getElementById('regName').value.trim();
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  const major = document.getElementById('regMajor').value;
  const year = document.getElementById('regYear').value;
  const bio = document.getElementById('regBio').value.trim();

  if (!name || !username || !email || !password || !major) {
    showError('Name, username, email, password and profession are required');
    return;
  }
  if (password !== pass2) {
    showError(t('passwordsDoNotMatch'));
    return;
  }
  if (password.length < 6) {
    showError(t('passwordTooShort'));
    return;
  }

  try {
    const res = await apiFetch('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name,
        username,
        email,
        password,
        major,
        profession: major,
        year,
        bio,
        language_pref: getLanguage()
      })
    });
    toast('Account created. Please check your email and verify your account before login.', 'success');
    switchTab('login');
    document.getElementById('loginIdentifier').value = email;
  } catch (e) {
    showError(e.message);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('loginForm').style.display !== 'none') doLogin();
  else doRegister();
});

const params = new URLSearchParams(location.search);
if (params.get('mode') === 'register') switchTab('register');
if (params.get('verified') === '1') {
  toast('Email verified successfully. You can now log in.', 'success');
}
</script>
</body>
</html>
